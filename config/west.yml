manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: hitsmaxft
      url-base: https://github.com/hitsmaxft
    - name: yuusg
      url-base: https://github.com/yuusg
    - name: englmaxi
      url-base: https://github.com/englmaxi
    - name: urob
      url-base: https://github.com/urob
    - name: janpfischer
      url-base: https://github.com/janpfischer
  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      clone-depth: 1
      import:
        file: app/west.yml
    - name: zmk-helpers
      remote: urob
      revision: main
      clone-depth: 1
    # hitsmaxft フォークの Kconfig 型なし定義バグ(Zephyr 4.1 非互換)を
    # 修正した自前フォークを使用。SHA 固定なので clone-depth は付けない。
    - name: zmk-rgbled-widget
      remote: yuusg
      revision: 53088d3939a5791ef0174fdfc87943e6c3c04036
    - name: zmk-dongle-display
      remote: englmaxi
      revision: main
      clone-depth: 1
    #- name: zmk-dongle-screen
    #  remote: janpfischer
    #  revision: main
    #  clone-depth: 1
  self:
    path: config
