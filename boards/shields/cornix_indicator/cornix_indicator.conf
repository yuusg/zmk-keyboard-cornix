## use ws2812-spi
CONFIG_SPI=y
# Zephyr 4.1 で WS2812_STRIP は廃止され WS2812_STRIP_SPI 等に分割。
# SPI ドライバは DT の worldsemi,ws2812-spi ノードから default y で自動有効化
# されるため、ここで明示指定しない（未充足依存への代入は werror になる）。
CONFIG_LED_STRIP=y
CONFIG_ZMK_EXT_POWER=y

CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_WS2812=y
CONFIG_RGBLED_WIDGET_LED_COUNT=2

CONFIG_RGBLED_WIDGET_BRIGHTNESS=64

CONFIG_RGBLED_WIDGET_LED_SHARING=y
